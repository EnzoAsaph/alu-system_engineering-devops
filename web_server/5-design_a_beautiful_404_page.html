<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a2e; color: #ffffff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
        .container { max-width: 600px; }
        .rocket { font-size: 60px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .error-code { font-size: 130px; font-weight: bold; color: #4fc3f7; text-shadow: 0 0 30px #4fc3f7; line-height: 1; margin: 10px 0; }
        h2 { font-size: 26px; color: #b0bec5; margin-bottom: 15px; }
        .message { font-size: 18px; color: #78909c; margin-bottom: 10px; font-style: italic; }
        .sub { font-size: 14px; color: #546e7a; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 12px 30px; border: 2px solid #4fc3f7; color: #4fc3f7; text-decoration: none; font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="rocket">🚀</div>
        <div class="error-code">404</div>
        <h2>Lost in Space!</h2>
        <p class="message">Ceci n'est pas une page</p>
        <p class="sub">The page you are looking for has drifted into a black hole.</p>
        <a href="/" class="btn">Return to Earth</a>
    </div>
</body>
</html>
